<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriptokForge TV - Live Channels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tv_guide.css">
</head>
<body>

<!-- LAYER 1: Video Player (Background) -->
<div id="videoContainer">
    <!-- YouTube player will load here -->
    <div id="player"></div>
    
    <!-- Loading screen -->
    <div id="loadingScreen">
        <div class="loading-spinner"></div>
        <p>Loading channel...</p>
    </div>
</div>

<!-- LAYER 2: EPG Guide (Bottom Overlay - slides up) -->
<div id="epgOverlay" class="epg-hidden">
    <div class="epg-header">
        <h2>📺 TV GUIDE</h2>
        <button id="closeEpg">✕</button>
    </div>
    
    <div class="epg-grid" id="epgGrid">
        <!-- EPG schedule loads here -->
    </div>
</div>

<!-- LAYER 3: Info Card (Top Overlay - always visible but transparent) -->
<div id="infoCard">
    <div class="info-content">
        <div class="channel-number">1</div>
        <div class="channel-info">
            <div class="channel-name">ABC News Live</div>
            <div class="program-title">Loading...</div>
        </div>
        <div class="channel-logo">
            <img src="" alt="" id="channelLogo">
        </div>
    </div>
</div>

<!-- LAYER 4: Controls Hint (fades out after 3 seconds) -->
<div id="controlsHint" class="controls-hint">
    <p>Press <kbd>G</kbd> for Guide • <kbd>↑↓</kbd> Change Channel • <kbd>I</kbd> for Info</p>
</div>

<!-- Load YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<!-- Load our custom JavaScript -->
<script src="/static/js/tv_player.js"></script>

</body>
</html>

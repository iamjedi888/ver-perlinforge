<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriptokForge VR Arena - Spectator Stadium</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        
        #loading {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #0a0c10; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            font-family: 'Share Tech Mono', monospace; color: #00e5a0;
        }
        #loading.hidden { display: none; }
        
        .vr-spinner {
            width: 60px; height: 60px; border: 4px solid rgba(0, 229, 160, 0.2);
            border-top-color: #00e5a0; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #controls-help {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.8); padding: 15px 20px;
            border-radius: 10px; font-family: 'Share Tech Mono', monospace;
            font-size: 14px; color: #c8d0e0; z-index: 100;
        }
        #controls-help kbd {
            background: #00e5a0; color: #000; padding: 2px 6px;
            border-radius: 3px; font-weight: bold;
        }
        
        /* Exit/Dashboard Button */
        #exit-button {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0, 229, 160, 0.9); color: #000;
            padding: 12px 24px; border-radius: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px; font-weight: bold;
            text-decoration: none; display: flex;
            align-items: center; gap: 10px; z-index: 200;
            border: 2px solid #00e5a0;
            box-shadow: 0 4px 15px rgba(0, 229, 160, 0.3);
            transition: all 0.2s; cursor: pointer;
        }
        #exit-button:hover {
            background: #00e5a0; transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 229, 160, 0.5);
        }
        #exit-button::before {
            content: '←'; font-size: 20px;
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="vr-spinner"></div>
    <p>LOADING VR ARENA...</p>
</div>

<div id="controls-help">
    <strong>🎮 CONTROLS</strong><br>
    <kbd>WASD</kbd> Move • <kbd>Mouse</kbd> Look Around<br>
    <kbd>Space</kbd> Jump • <kbd>Shift</kbd> Sprint
</div>

<a href="/" id="exit-button">EXIT TO DASHBOARD</a>

<a-scene>
    <a-assets>
        <video id="stream1" crossorigin="anonymous" loop muted autoplay playsinline></video>
        <video id="stream2" crossorigin="anonymous" loop muted autoplay playsinline></video>
    </a-assets>
    
    <a-sky color="#0a0c10"></a-sky>
    
    <a-plane position="0 0 0" rotation="-90 0 0" width="40" height="40" color="#1a1d2e"></a-plane>
    
    <a-plane position="0 5 -15" rotation="0 0 0" width="40" height="10" color="#111318"></a-plane>
    
    <a-video src="#stream1" position="-8 5 -14.9" width="10" height="5.625"></a-video>
    <a-video src="#stream2" position="8 5 -14.9" width="10" height="5.625"></a-video>
    
    <a-text value="CHANNEL 1" position="-8 2 -14.8" align="center" color="#00e5a0" width="12"></a-text>
    <a-text value="CHANNEL 2" position="8 2 -14.8" align="center" color="#00e5a0" width="12"></a-text>
    
    <a-plane position="-19 5 0" rotation="0 90 0" width="30" height="10" color="#0f1218"></a-plane>
    
    <a-text value="TOP PLAYERS" position="-18.9 9 0" rotation="0 90 0" align="center" color="#00e5a0" width="20"></a-text>
    
    <a-entity id="leaderboard" position="-18.9 8 0" rotation="0 90 0"></a-entity>
    
    <a-plane position="19 5 0" rotation="0 -90 0" width="30" height="10" color="#111318"></a-plane>
    
    <a-plane position="0 10 0" rotation="90 0 0" width="40" height="40" color="#0a0c10"></a-plane>
    
    <a-entity id="seats" position="0 0.5 5">
        <a-box position="-5 0 0" width="1.5" height="1" depth="1" color="#2a3045"></a-box>
        <a-box position="-2.5 0 0" width="1.5" height="1" depth="1" color="#2a3045"></a-box>
        <a-box position="0 0 0" width="1.5" height="1" depth="1" color="#2a3045"></a-box>
        <a-box position="2.5 0 0" width="1.5" height="1" depth="1" color="#2a3045"></a-box>
        <a-box position="5 0 0" width="1.5" height="1" depth="1" color="#2a3045"></a-box>
        <a-box position="-5 0.5 2" width="1.5" height="1" depth="1" color="#2a3045"></a-box>
        <a-box position="-2.5 0.5 2" width="1.5" height="1" depth="1" color="#2a3045"></a-box>
        <a-box position="0 0.5 2" width="1.5" height="1" depth="1" color="#2a3045"></a-box>
        <a-box position="2.5 0.5 2" width="1.5" height="1" depth="1" color="#2a3045"></a-box>
        <a-box position="5 0.5 2" width="1.5" height="1" depth="1" color="#2a3045"></a-box>
    </a-entity>
    
    <a-entity position="0 2 8">
        <a-plane color="#00e5a0" width="2" height="0.5" class="clickable" onclick="window.location.href='/'"></a-plane>
        <a-text value="EXIT TO DASHBOARD" position="0 0 0.01" align="center" color="#000" width="3"></a-text>
    </a-entity>
    
    <a-light type="ambient" color="#4a5570" intensity="0.5"></a-light>
    <a-light type="directional" position="0 10 0" intensity="0.7" color="#00e5a0"></a-light>
    <a-light type="point" position="-10 8 -10" intensity="0.6" color="#0091ff"></a-light>
    <a-light type="point" position="10 8 -10" intensity="0.6" color="#0091ff"></a-light>
    
    <a-entity id="player" position="0 1.6 10" movement-controls="fly: false; speed: 0.15">
        <a-entity camera look-controls="pointerLockEnabled: true"></a-entity>
    </a-entity>
    
</a-scene>

<script src="/static/js/arena.js"></script>

</body>
</html>

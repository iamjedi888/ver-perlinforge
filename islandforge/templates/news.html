<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriptokForge News - Your Interests</title>
    <link rel="stylesheet" href="/static/css/news.css">
</head>
<body>
    
    <div class="news-header">
        <h1>🌐 TriptokForge News</h1>
        <div class="live-badge">● LIVE</div>
    </div>
    
    <div class="news-ticker-bar">
        <div class="ticker-label">LATEST</div>
        <div class="ticker-content" id="tickerContent">
            Loading latest headlines...
        </div>
    </div>
    
    <div class="news-container">
        
        <!-- Interest Toggles -->
        <div class="interests-panel">
            <h3>📌 Your Interests</h3>
            <p class="interests-hint">Check the topics you want to see news about</p>
            <div class="interests-grid" id="interestsGrid">
                <!-- Checkboxes loaded here -->
            </div>
        </div>
        
        <!-- News Grid -->
        <div class="news-grid" id="newsGrid">
            <!-- News cards loaded here -->
        </div>
        
    </div>
    
    <script src="/static/js/news.js"></script>
    
</body>
</html>
